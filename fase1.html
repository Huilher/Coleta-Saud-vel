<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo de Reciclagem - Fase 1</title>
  <link rel="stylesheet" href="estilo-fase1.css">
</head>
<body>


  <!-- HUD com vidas e tempo -->
  <div class="hud">
    <div id="lives" class="lives"></div>
    <div id="box-sha">
      <div id="timer" class="timer">05:00</div>
    </div>
  </div>

   <!-- Container do botão de pause -->
   <div id="pause-container">
    <button id="pause-btn">
      <img src="pause.png" alt="Pausar">
    </button>
  </div>
  
  <div id="message" class="central-message"></div>

  <div class="background_image">
    <!-- Lixos com destino (data-target) para checagem -->
    <img id="img1" class="draggable-image" data-target="papel" src="lixo_papel.png" />
    <img id="img2" class="draggable-image" data-target="vidro" src="lixo_vidro.png" />
    <img id="img3" class="draggable-image" data-target="plastico" src="lixo_plastico.png" />
    <img id="img4" class="draggable-image" data-target="organico" src="lixo_organico.png" />
    <img id="img5" class="draggable-image" data-target="papel" src="lixo_papel2.png" />
    <img id="img6" class="draggable-image" data-target="nao_reciclavel" src="lixo_nao_reciclavel1.png" />
    <img id="img7" class="draggable-image" data-target="metal" src="lixo_metal.png" />
  </div>

  <img class="bin" src="recycle_name_suport.png" />

  <!-- Áreas de destino dos lixos -->
  <div id="vidro" class="zone"></div>
  <div id="papel" class="zone"></div>
  <div id="plastico" class="zone"></div>
  <div id="metal" class="zone"></div>
  <div id="organico" class="zone"></div>
  <div id="nao_reciclavel" class="zone"></div>
  <div id="renascer" class="zone_renascer"></div>


  
  <div id="message" class="central-message"></div>

  <script src="script-fase1.js"></script>
</body>
</html>
